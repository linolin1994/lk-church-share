<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1A2A4A">
<title>LK Church 小組分享</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF7F2;
    --ink:#1A2A4A;
    --accent:#8B2A2A;
    --gold:#B8860B;
    --muted:#6B6557;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);}
  body{
    font-family:"Noto Sans TC","PingFang TC","Heiti TC",sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.7;
  }
  .serif{font-family:"Noto Serif TC","Songti TC",serif;}

  .wrap{max-width:600px;margin:0 auto;padding:48px 24px 80px;}

  header{text-align:center;margin-bottom:40px;}
  .stamp{
    display:inline-block;font-size:12px;letter-spacing:6px;
    color:var(--accent);padding:4px 14px;
    border:1px solid var(--accent);border-radius:999px;
    margin-bottom:18px;
  }
  h1{
    font-size:38px;font-weight:900;margin:0 0 10px;
    letter-spacing:1px;line-height:1.3;
  }
  .subtitle{color:var(--muted);font-size:15px;letter-spacing:2px;}

  .section-title{
    font-size:13px;letter-spacing:4px;color:var(--accent);
    margin:36px 0 16px;font-weight:700;
  }

  .card{
    display:block;
    background:#FFF;border-radius:20px;padding:24px 22px;
    box-shadow:0 8px 28px rgba(26,42,74,0.08);
    text-decoration:none;color:var(--ink);
    margin-bottom:16px;
    transition:transform .2s,box-shadow .2s;
    border-left:4px solid var(--accent);
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(26,42,74,0.14);}
  .card .date{
    font-size:13px;letter-spacing:3px;color:var(--gold);
    font-weight:700;margin-bottom:8px;
  }
  .card .title-zh{
    font-size:24px;font-weight:700;line-height:1.4;
    margin-bottom:10px;
  }
  .card .desc{
    font-size:15px;color:var(--muted);line-height:1.6;
  }
  .card .go{
    margin-top:14px;font-size:13px;color:var(--accent);
    letter-spacing:2px;font-weight:700;
  }

  .empty{
    text-align:center;color:var(--muted);
    font-size:14px;padding:24px;
    border:1px dashed #D5CFC0;border-radius:16px;
  }

  footer{
    text-align:center;margin-top:60px;
    font-size:13px;color:var(--muted);letter-spacing:2px;
  }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="stamp serif">LK CHURCH</div>
  <h1 class="serif">小組分享</h1>
  <div class="subtitle serif">每週主題 · 手機友善</div>
</header>

<div class="section-title serif">最近一次</div>

<a class="card" href="./0613-leadership/">
  <div class="date">6 / 13　門訓</div>
  <div class="title-zh serif">主宰權 就是領導力</div>
  <div class="desc">
    小組長成功的關鍵、領袖必備特質、<br>
    21 世紀領袖座右銘、開發領導力。
  </div>
  <div class="go">點此進入 →</div>
</a>

<div class="section-title serif">之前的分享</div>

<a class="card" href="./0529-filled-with-what/">
  <div class="date">5 / 29　小組分享</div>
  <div class="title-zh serif">被甚麼充滿？</div>
  <div class="desc">
    從巴別塔到五旬節 ——<br>
    人不可能空白，問題是「被甚麼充滿」。
  </div>
  <div class="go">點此進入 →</div>
</a>

<footer>
  © LK Church · 願榮耀歸給上帝
</footer>

</div>
</body>
</html>
